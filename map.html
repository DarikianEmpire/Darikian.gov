    }

        color: white;
    }

    .request-box {
        margin-top: 20px;
        border-top: 1px solid red;
        padding-top: 20px;
    }

    input, textarea {
        width: 100%;
        background: #111;
        color: white;
        border: 1px solid red;
        padding: 10px;
        margin-top: 10px;
        margin-bottom: 15px;
        box-sizing: border-box;
    }

    button {
        background: red;
        color: white;
        border: none;
        padding: 12px 20px;
        cursor: pointer;

    button:hover {
        background: darkred;

function loadSector() {

    const sector =
        document.getElementById("sectorSelect").value;

    const list =
        document.getElementById("countryList");

    const details =
        document.getElementById("details");

    list.innerHTML = "";

    for (const country in data[sector]) {

        const div =
            document.createElement("div");

        div.className = "country";

        div.innerText = country;

        div.onclick = function () {

            details.innerText =
                country + "\n\n" + data[sector][country];

        };

        list.appendChild(div);

    }

    details.innerText =
        "Select a country to view details.";

}

window.onload = loadSector;
