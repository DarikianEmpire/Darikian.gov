<style>
* {
    box-sizing: border-box;
}

html {
    background: black;
}

body {
    background-color: black;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 0;
    padding: 0;
    overflow-x: hidden;
}

header {
    padding: 30px;
    border-bottom: 2px solid red;
    background-color: black;
}

h1 {
    color: red;
    margin: 0 0 15px 0;
}

h2 {
    color: white;
    margin-top: 0;
}

nav a {
    color: red;
    margin: 10px;
    text-decoration: none;
    font-weight: bold;
}

nav a:hover {
    color: white;
}

.container {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 30px;
    gap: 20px;
    flex-wrap: wrap;
    width: 100%;
    background-color: black;
}

.map-panel {
    flex: 1 1 620px;
    max-width: 980px;
    border: 1px solid red;
    padding: 20px;
    background-color: #080808;
}

.info-panel {
    flex: 0 1 420px;
    min-width: 300px;
    border: 1px solid red;
    padding: 20px;
    min-height: 300px;
    background-color: #080808;
}

.map-wrapper {
    position: relative;
    width: 100%;
    margin: 0 auto;
    overflow: hidden;
    background: black;
    line-height: 0;
}

.map-img {
    width: 100%;
    height: auto;
    display: block;
    user-select: none;
}

.map-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: block;
}

.nation {
    fill: rgba(255, 0, 0, 0);
    stroke: rgba(255, 0, 0, 0);
    stroke-width: 2px;
    vector-effect: non-scaling-stroke;
    cursor: pointer;
    pointer-events: all;
    transition: fill 0.15s ease, stroke 0.15s ease;
}

.nation:hover {
    fill: rgba(255, 0, 0, 0.28);
    stroke: red;
    stroke-width: 2px;
    vector-effect: non-scaling-stroke;
}

.details {
    text-align: left;
    white-space: pre-wrap;
    background-color: #050505;
    border: 1px solid #333;
    padding: 15px;
    min-height: 120px;
    line-height: 1.5;
}

.request-box {
    margin-top: 20px;
    border-top: 1px solid red;
    padding-top: 20px;
}

input,
textarea,
select {
    width: 100%;
    background: #111;
    color: white;
    border: 1px solid red;
    padding: 10px;
    margin-top: 10px;
    margin-bottom: 15px;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

textarea {
    resize: vertical;
}

button {
    background: red;
    color: white;
    border: none;
    padding: 12px 20px;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: darkred;
}

@media (max-width: 900px) {
    .container {
        padding: 15px;
    }

    .map-panel,
    .info-panel {
        flex-basis: 100%;
        max-width: 100%;
        width: 100%;
    }

    nav a {
        display: inline-block;
        margin: 6px;
    }
}
</style>
</head>
